name: Python application

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install lint/test tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          # Install project deps only if you add a requirements.txt later.
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint with flake8
        run: |
          # Fail the build ONLY on real errors: syntax errors + undefined names.
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Style report (never fails the build) — informational only.
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Test with pytest
        run: |
          # Only run pytest if tests actually exist, otherwise the "no tests
          # collected" exit code (5) would fail an otherwise-green build.
          if git ls-files '*test_*.py' '*_test.py' 'tests/**/*.py' | grep -q .; then
            pytest
          else
            echo "No tests found — skipping pytest."
          fi
